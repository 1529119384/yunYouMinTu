<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>makeTiles 瓦片预览示例</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { display: flex; flex-direction: column; }

    .toolbar {
      padding: 12px 16px;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .toolbar label { font-size: 13px; color: #475569; }
    .toolbar input {
      padding: 8px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 14px;
    }
    .toolbar input.url { width: 300px; }
    .toolbar input.id { width: 200px; }
    .toolbar button {
      padding: 8px 16px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }
    .toolbar button:hover { background: #1d4ed8; }
    .toolbar .hint { color: #94a3b8; font-size: 12px; width: 100%; }

    #map { flex: 1; background: #1e293b; }

    .status {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      padding: 16px 24px;
      border-radius: 10px;
      font-size: 15px;
      z-index: 2000;
      display: none;
    }
    .status.loading { display: block; background: rgba(0,0,0,0.6); color: #fff; }
    .status.error { display: block; background: rgba(0,0,0,0.7); color: #fca5a5; }
  </style>
</head>
<body>
  <div class="toolbar">
    <label>API</label>
    <input id="apiInput" class="url" type="text" value="http://localhost:8000" />
    <label>imageId</label>
    <input id="idInput" class="id" type="text" placeholder="切片 ID" />
    <button onclick="loadTile()">加载瓦片</button>
    <span class="hint">POST /api/tiles 创建切片 → GET /api/tiles 查看列表 → 填入 imageId 加载</span>
  </div>
  <div id="map"></div>
  <div id="status" class="status"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    let map;
    const EMPTY = 'data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=';

    function showStatus(msg, type) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status ' + type;
    }
    function hideStatus() { document.getElementById('status').className = 'status'; }

    document.getElementById('idInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') loadTile();
    });

    async function loadTile() {
      const api = document.getElementById('apiInput').value.trim().replace(/\/+$/, '');
      const imageId = document.getElementById('idInput').value.trim();
      if (!api) { showStatus('请输入 API 地址', 'error'); return; }
      if (!imageId) { showStatus('请输入 imageId', 'error'); return; }

      showStatus('加载中...', 'loading');

      let manifest;
      try {
        const res = await fetch(api + '/api/tiles/' + encodeURIComponent(imageId) + '/manifest');
        if (!res.ok) throw new Error('manifest 不存在 (' + res.status + ')');
        manifest = await res.json();
      } catch (e) {
        showStatus('加载失败: ' + e.message, 'error');
        return;
      }

      hideStatus();
      if (map) { map.remove(); map = null; }

      map = L.map('map', {
        crs: L.CRS.Simple,
        minZoom: manifest.minZoom,
        maxZoom: manifest.maxZoom,
        zoomSnap: 0.25,
        zoomDelta: 0.5,
        attributionControl: false,
      });

      const sw = map.unproject([0, manifest.height], manifest.maxZoom);
      const ne = map.unproject([manifest.width, 0], manifest.maxZoom);
      const bounds = L.latLngBounds(sw, ne);
      map.setMaxBounds(bounds.pad(0.1));
      map.fitBounds(bounds);

      const baseUrl = manifest.urlTemplate.replace(/\/\{z\}\/\{x\}\/\{y\}\.\w+$/, '');
      const ext = manifest.imageExtension || 'png';
      const levels = manifest.levels || [];

      const TileLayer = L.GridLayer.extend({
        createTile: function(coords, done) {
          const tile = document.createElement('img');
          tile.width = manifest.tileSize;
          tile.height = manifest.tileSize;
          tile.alt = '';
          tile.draggable = false;
          tile.style.width = '100%';
          tile.style.height = '100%';

          const levelInfo = levels.find(function(l) { return l.z === coords.z; });
          if (!levelInfo || coords.x < 0 || coords.y < 0 ||
              coords.x > levelInfo.cols - 1 || coords.y > levelInfo.rows - 1) {
            tile.src = EMPTY;
            requestAnimationFrame(function() { done(null, tile); });
            return tile;
          }

          tile.src = baseUrl + '/' + coords.z + '/' + coords.x + '/' + coords.y + '.' + ext;
          tile.onload = function() { done(null, tile); };
          tile.onerror = function() { tile.src = EMPTY; done(null, tile); };
          return tile;
        }
      });

      new TileLayer({ tileSize: manifest.tileSize }).addTo(map);
    }
  </script>
</body>
</html>
