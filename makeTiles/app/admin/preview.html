<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>切片预览</title>
  <link rel="stylesheet" href="/admin/static/leaflet/leaflet.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #map { height: 100%; width: 100%; }
    body { background: #1a1a2e; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    #map { background: #1a1a2e; }

    .toolbar {
      position: fixed; top: 12px; left: 60px; z-index: 1000;
      display: flex; gap: 8px; align-items: center;
    }
    .toolbar .info {
      background: rgba(255,255,255,0.95); padding: 8px 14px; border-radius: 8px;
      font-size: 13px; color: #374151; box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      display: flex; gap: 12px; align-items: center;
    }
    .toolbar .info .title { font-weight: 600; }
    .toolbar .info .dim { color: #6b7280; }
    .toolbar .info .zoom { color: #2563eb; font-weight: 500; }

    .btn-reset {
      background: rgba(255,255,255,0.95); border: none; padding: 8px 14px;
      border-radius: 8px; font-size: 13px; color: #374151; cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15); transition: all 0.15s;
    }
    .btn-reset:hover { background: #fff; box-shadow: 0 2px 12px rgba(0,0,0,0.2); }

    .coord-bar {
      position: fixed; bottom: 12px; left: 12px; z-index: 1000;
      background: rgba(0,0,0,0.75); color: #e5e7eb; padding: 6px 12px;
      border-radius: 6px; font-size: 12px; font-family: monospace;
    }

    .zoom-bar {
      position: fixed; bottom: 12px; right: 12px; z-index: 1000;
      background: rgba(0,0,0,0.75); color: #e5e7eb; padding: 6px 12px;
      border-radius: 6px; font-size: 12px;
    }

    .loading {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      z-index: 2000; color: #fff; font-size: 16px;
      background: rgba(0,0,0,0.6); padding: 16px 24px; border-radius: 10px;
    }

    .error {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      z-index: 2000; color: #ef4444; font-size: 15px;
      background: rgba(0,0,0,0.6); padding: 16px 24px; border-radius: 10px;
    }

    .leaflet-control-zoom { border: none !important; box-shadow: 0 2px 8px rgba(0,0,0,0.2) !important; }
    .leaflet-control-zoom a { border-radius: 8px !important; margin-bottom: 4px !important; }
  </style>
</head>
<body>
  <div id="loading" class="loading">加载中...</div>
  <div id="map"></div>

  <div class="toolbar" id="toolbar" style="display:none">
    <div class="info">
      <span class="title" id="infoTitle"></span>
      <span class="dim" id="infoDim"></span>
      <span class="zoom" id="infoZoom"></span>
    </div>
    <button class="btn-reset" onclick="resetView()">重置视图</button>
  </div>

  <div class="coord-bar" id="coordBar" style="display:none">
    鼠标位置: --
  </div>

  <div class="zoom-bar" id="zoomBar" style="display:none">
    缩放: --
  </div>

  <script src="/admin/static/leaflet/leaflet.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const imageId = params.get('image_id');
    const API = '';

    let map, manifest, bounds;

    function showError(msg) {
      document.getElementById('loading').style.display = 'none';
      const el = document.createElement('div');
      el.className = 'error';
      el.textContent = msg;
      document.body.appendChild(el);
    }

    if (!imageId) {
      showError('缺少 image_id 参数');
      throw new Error('missing image_id');
    }

    async function init() {
      try {
        const res = await fetch(API + '/api/tiles/' + imageId + '/manifest');
        if (!res.ok) throw new Error('加载 manifest 失败 (' + res.status + ')');
        manifest = await res.json();
      } catch (e) {
        showError('加载失败: ' + e.message);
        return;
      }

      document.getElementById('loading').style.display = 'none';
      document.getElementById('toolbar').style.display = 'flex';
      document.getElementById('coordBar').style.display = 'block';
      document.getElementById('zoomBar').style.display = 'block';

      document.getElementById('infoTitle').textContent = manifest.title;
      document.getElementById('infoDim').textContent = manifest.width + ' × ' + manifest.height + ' px';
      document.getElementById('infoZoom').textContent = '缩放 ' + manifest.minZoom + ' ~ ' + manifest.maxZoom;

      map = L.map('map', {
        crs: L.CRS.Simple,
        minZoom: manifest.minZoom,
        maxZoom: manifest.maxZoom,
        zoomSnap: 0.25,
        zoomDelta: 0.5,
        attributionControl: false,
      });

      const sw = map.unproject([0, manifest.height], manifest.maxZoom);
      const ne = map.unproject([manifest.width, 0], manifest.maxZoom);
      bounds = L.latLngBounds(sw, ne);
      map.setMaxBounds(bounds.pad(0.1));
      map.fitBounds(bounds);

      const EMPTY = 'data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=';

      const TileLayer = L.GridLayer.extend({
        createTile: function(coords, done) {
          const tile = document.createElement('img');
          tile.width = manifest.tileSize;
          tile.height = manifest.tileSize;
          tile.alt = '';
          tile.draggable = false;
          tile.style.width = '100%';
          tile.style.height = '100%';
          tile.style.imageRendering = 'auto';
          tile.src = API + '/api/tiles/' + imageId + '/' + coords.z + '/' + coords.x + '/' + coords.y + '.png';
          tile.onload = function() { done(null, tile); };
          tile.onerror = function() { tile.src = EMPTY; done(null, tile); };
          return tile;
        }
      });

      new TileLayer({ tileSize: manifest.tileSize }).addTo(map);

      map.on('zoomend', updateZoomInfo);
      map.on('mousemove', updateCoord);
      updateZoomInfo();
    }

    function resetView() {
      if (map && bounds) map.fitBounds(bounds, { animate: true });
    }

    function updateZoomInfo() {
      if (!map) return;
      const z = map.getZoom();
      document.getElementById('infoZoom').textContent = '缩放 ' + manifest.minZoom + ' ~ ' + manifest.maxZoom + '  当前: ' + z.toFixed(1);
      document.getElementById('zoomBar').textContent = '缩放: ' + z.toFixed(1) + ' / ' + manifest.maxZoom;
    }

    function updateCoord(e) {
      if (!map) return;
      const p = map.latLngToContainerPoint(e.latlng);
      const px = Math.round(p.x);
      const py = Math.round(p.y);
      document.getElementById('coordBar').textContent = '像素: (' + px + ', ' + py + ')  瓦片: z=' + map.getZoom().toFixed(0);
    }

    init();
  </script>
</body>
</html>
